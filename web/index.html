<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <title>Prism</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #eee;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 11px;
        letter-spacing: 0.5px;
        opacity: 0.45;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="status">loading…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
