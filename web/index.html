<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <title>Prism</title>
    <style>
      :root {
        --ink: #eaeaf5;
        --dim: rgba(234, 234, 245, 0.45);
        --faint: rgba(234, 234, 245, 0.18);
        --bg: #000;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--ink);
        -webkit-user-select: none;
        user-select: none;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 11px;
        letter-spacing: 0.5px;
        opacity: 0.45;
        pointer-events: none;
      }

      /* HUD */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #stats {
        position: absolute;
        top: 10px;
        right: 14px;
        text-align: right;
        font-size: 12px;
        letter-spacing: 1px;
      }
      #stats .rank {
        font-size: 14px;
        color: var(--ink);
      }
      #stats .kills {
        color: var(--dim);
        margin-top: 2px;
      }

      #xp-wrap {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 22px;
        width: min(640px, 60vw);
        height: 3px;
        background: var(--faint);
        border-radius: 2px;
        overflow: hidden;
      }
      #xp-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7fd3ff, #fff);
        box-shadow: 0 0 12px #7fd3ff, 0 0 24px rgba(127, 211, 255, 0.5);
        transition: width 120ms ease-out;
      }

      /* Shard tray: 10 circles at the bottom-left, filling with color as their level rises. */
      #shards-tray {
        position: absolute;
        left: 14px;
        bottom: 16px;
        display: flex;
        gap: 6px;
      }
      .shard-pip {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid var(--faint);
        background: transparent;
        position: relative;
      }
      .shard-pip[data-level="0"] { opacity: 0.35; }
      .shard-pip::after {
        content: attr(data-level);
        position: absolute;
        top: -14px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 8px;
        color: var(--dim);
      }
      .shard-pip[data-level="0"]::after { content: ""; }

      /* Level-up overlay */
      #levelup {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 28px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        animation: fade-in 220ms ease-out;
      }
      #levelup.shown { display: flex; }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      #levelup-title {
        font-size: 12px;
        letter-spacing: 8px;
        color: var(--dim);
      }
      #levelup-rank {
        font-size: 34px;
        font-weight: 200;
        letter-spacing: 4px;
      }
      #levelup-cards {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0 20px;
      }
      .shard-card {
        width: 220px;
        min-height: 240px;
        padding: 22px 20px;
        border: 1px solid var(--faint);
        border-radius: 2px;
        background: rgba(10, 8, 20, 0.55);
        display: flex;
        flex-direction: column;
        gap: 12px;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 220ms ease;
      }
      .shard-card:hover, .shard-card:focus {
        transform: translateY(-4px);
        outline: none;
      }
      .shard-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        box-shadow: 0 0 20px currentColor, 0 0 42px currentColor inset;
        margin-bottom: 4px;
      }
      .shard-name {
        font-size: 13px;
        letter-spacing: 4px;
        font-weight: 500;
      }
      .shard-level {
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--dim);
      }
      .shard-desc {
        font-size: 11px;
        line-height: 1.6;
        color: var(--dim);
      }
      .shard-synergy {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-top: 4px;
        font-size: 10px;
        color: #ffd740;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .shard-hotkey {
        margin-top: auto;
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--faint);
      }

      /* Death / game-over overlay */
      #death-screen {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        z-index: 20;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(16px) saturate(120%);
        -webkit-backdrop-filter: blur(16px) saturate(120%);
        animation: fade-in 400ms ease-out;
      }
      #death-screen.shown { display: flex; }
      #death-title {
        font-size: 18px;
        letter-spacing: 10px;
        color: #ff6e6e;
      }
      #death-score {
        font-size: 36px;
        font-weight: 200;
        letter-spacing: 3px;
      }
      #death-stats {
        font-size: 11px;
        letter-spacing: 2px;
        color: var(--dim);
        text-align: center;
        line-height: 1.8;
      }
      #death-restart {
        margin-top: 12px;
        padding: 10px 32px;
        border: 1px solid var(--faint);
        border-radius: 2px;
        background: rgba(10, 8, 20, 0.55);
        color: var(--ink);
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 4px;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease;
        pointer-events: auto;
      }
      #death-restart:hover {
        transform: translateY(-2px);
        border-color: var(--dim);
      }
      #death-hint {
        font-size: 9px;
        letter-spacing: 2px;
        color: var(--faint);
      }

      /* HP bar */
      #hp-wrap {
        position: absolute;
        left: 14px;
        top: 10px;
        width: 120px;
        height: 4px;
        background: var(--faint);
        border-radius: 2px;
        overflow: hidden;
      }
      #hp-fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff4444, #ff9966, #66ff88);
        transition: width 120ms ease-out;
      }

      /* Timer + wave */
      #timer-wrap {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
      }
      #timer {
        font-size: 16px;
        letter-spacing: 3px;
        font-weight: 200;
        opacity: 0.7;
      }
      #wave-label {
        font-size: 9px;
        letter-spacing: 2px;
        color: var(--dim);
        margin-top: 2px;
      }

      /* Dash cooldown indicator */
      #dash-wrap {
        position: absolute;
        left: 14px;
        top: 20px;
        width: 120px;
        height: 3px;
        background: var(--faint);
        border-radius: 2px;
        overflow: hidden;
      }
      #dash-fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #9a9dff, #c9a3ff);
        transition: width 80ms linear;
      }
      #dash-label {
        position: absolute;
        left: 14px;
        top: 26px;
        font-size: 8px;
        letter-spacing: 2px;
        color: var(--faint);
      }

      /* Wave clear banner */
      #wave-clear {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 22px;
        letter-spacing: 8px;
        font-weight: 200;
        color: var(--ink);
        opacity: 0;
        pointer-events: none;
        transition: opacity 300ms ease-out;
        text-shadow: 0 0 20px rgba(127, 211, 255, 0.5);
      }
      #wave-clear.shown { opacity: 0.85; }

      /* Victory title override */
      .victory-title {
        color: #66ff88 !important;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="status">loading…</div>

    <div id="hud">
      <div id="hp-wrap"><div id="hp-fill"></div></div>
      <div id="dash-wrap"><div id="dash-fill"></div></div>
      <div id="dash-label">DASH [SPACE]</div>
      <div id="timer-wrap">
        <div id="timer">0:00</div>
        <div id="wave-label">WAVE 1</div>
      </div>
      <div id="stats">
        <div class="rank" id="rank">rank 0</div>
        <div class="kills" id="kills">0 kills</div>
      </div>
      <div id="xp-wrap"><div id="xp-fill"></div></div>
      <div id="shards-tray"></div>
    </div>

    <div id="wave-clear">WAVE CLEAR</div>

    <div id="levelup">
      <div id="levelup-title">RANK UP</div>
      <div id="levelup-rank">—</div>
      <div id="levelup-cards"></div>
    </div>

    <div id="death-screen">
      <div id="death-title">SHATTERED</div>
      <div id="death-score">0</div>
      <div id="death-stats"></div>
      <button id="death-restart">PLAY AGAIN</button>
      <div id="death-hint">SPACE / TAP</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
